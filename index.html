<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Demo Kamera</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 15px;
    }

    video {
      width: 90%;
      max-width: 400px;
      border-radius: 12px;
      background: black;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>

  <h2>📸 Demo Kamera Depan</h2>

  <video id="video" autoplay playsinline></video>

  <button onclick="startCamera()">Mulai Kamera</button>

  <script>
    const video = document.getElementById('video');

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" }, // kamera depan
          audio: false
        });

        video.srcObject = stream;

      } catch (err) {
        alert("Gagal akses kamera: " + err);
      }
    }

    // auto jalan saat halaman dibuka (opsional)
    window.onload = () => {
      startCamera();
    };
  </script>

</body>
</html>
