<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Real Face Scan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>
body {
  margin: 0;
  background: #0b1220;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  color: white;
}

.wrapper {
  position: relative;
  width: 260px;
  height: 260px;
}

video {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  transform: scaleX(-1);
}

/* 🔵 ring progress */
svg {
  position: absolute;
  top: 0;
  left: 0;
  transform: rotate(-90deg);
}

circle {
  fill: none;
  stroke-width: 6;
}

.bg {
  stroke: rgba(255,255,255,0.1);
}

.progress {
  stroke: #22c55e;
  stroke-linecap: round;
  stroke-dasharray: 754;
  stroke-dashoffset: 754;
  transition: 0.1s linear;
  filter: drop-shadow(0 0 6px #22c55e);
}

.status {
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>🔒 Real Face Scan</h2>

<div class="wrapper">
  <svg width="260" height="260">
    <circle class="bg" cx="130" cy="130" r="120"/>
    <circle class="progress" cx="130" cy="130" r="120"/>
  </svg>

  <video id="video" autoplay playsinline></video>
</div>

<div class="status" id="status">Loading AI...</div>

<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const statusText = document.getElementById("status");
const progressBar = document.querySelector(".progress");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const radius = 120;
const circumference = 2 * Math.PI * radius;

progressBar.style.strokeDasharray = circumference;
progressBar.style.strokeDashoffset = circumference;

let progress = 0;

// 📸 kamera
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  });

  video.srcObject = stream;
}

// 🧠 load AI model
async function loadAI() {
  const MODEL_URL = "https://cdn.jsdelivr.net/npm/face-api.js/weights";

  await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
}

// 🔍 deteksi wajah REAL
async function detectFace() {
  const result = await faceapi.detectSingleFace(
    video,
    new faceapi.TinyFaceDetectorOptions()
  );

  return result;
}

// 🔵 update ring
function setProgress(val) {
  const offset = circumference - (val / 100) * circumference;
  progressBar.style.strokeDashoffset = offset;
}

// 📸 capture
function capture() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  statusText.textContent = "✔ Wajah terverifikasi!";
}

// 🔥 loop utama
async function loop() {
  const face = await detectFace();

  if (face) {
    statusText.textContent = "Wajah terdeteksi...";

    progress += 3;

    if (progress >= 100) {
      progress = 100;
      setProgress(progress);
      capture();
      return;
    }

  } else {
    statusText.textContent = "Arahkan wajah ke kamera...";
    progress -= 5;
    if (progress < 0) progress = 0;
  }

  setProgress(progress);

  requestAnimationFrame(loop);
}

// start system
window.onload = async () => {
  await startCamera();
  await loadAI();

  statusText.textContent = "Siap scan wajah";
  loop();
};
</script>

</body>
</html>
