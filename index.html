<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Face Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>
body {
  margin: 0;
  background: #0b1220;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.wrapper {
  position: relative;
  width: 260px;
  height: 260px;
}

video {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  transform: scaleX(-1);
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  font-weight: bold;
}

.status {
  margin-top: 15px;
}
</style>
</head>

<body>

<h2>🔒 Face Login System</h2>

<div class="wrapper">
  <video id="video" autoplay playsinline></video>
</div>

<button onclick="registerFace()">Register Wajah</button>
<button onclick="loginFace()">Scan Login</button>

<div class="status" id="status">Loading...</div>

<script>
const video = document.getElementById("video");
const statusText = document.getElementById("status");

let savedDescriptor = null;

// kamera
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" }
  });
  video.srcObject = stream;
}

// load model
async function loadAI() {
  const MODEL_URL = "https://cdn.jsdelivr.net/npm/face-api.js/weights";

  await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
  await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
  await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
}

// ambil descriptor wajah
async function getDescriptor() {
  const detection = await faceapi
    .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
    .withFaceLandmarks()
    .withFaceDescriptor();

  return detection;
}

// register wajah
async function registerFace() {
  statusText.textContent = "Mengambil wajah...";

  const result = await getDescriptor();

  if (!result) {
    statusText.textContent = "❌ Wajah tidak terdeteksi";
    return;
  }

  savedDescriptor = result.descriptor;

  statusText.textContent = "✅ Wajah berhasil disimpan";
}

// login wajah
async function loginFace() {
  statusText.textContent = "Scanning...";

  const result = await getDescriptor();

  if (!result || !savedDescriptor) {
    statusText.textContent = "❌ Belum ada data wajah";
    return;
  }

  const distance = faceapi.euclideanDistance(
    savedDescriptor,
    result.descriptor
  );

  // threshold makin kecil = makin ketat
  if (distance < 0.5) {
    statusText.textContent = "✅ LOGIN BERHASIL";
  } else {
    statusText.textContent = "❌ WAJAH TIDAK COCOK";
  }
}

// start
window.onload = async () => {
  await startCamera();
  await loadAI();

  statusText.textContent = "Siap digunakan";
};
</script>

</body>
</html>
