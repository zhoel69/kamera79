<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Face Progress Lock</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #0b1220;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  color: white;
}

h2 {
  margin-bottom: 20px;
}

/* 🔵 wrapper */
.wrapper {
  position: relative;
  width: 260px;
  height: 260px;
}

/* kamera */
.camera {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
}

/* 🔵 progress ring */
svg {
  position: absolute;
  top: 0;
  left: 0;
  transform: rotate(-90deg);
}

circle {
  fill: none;
  stroke-width: 6;
}

.bg {
  stroke: rgba(255,255,255,0.1);
}

.progress {
  stroke: #22c55e;
  stroke-linecap: round;
  stroke-dasharray: 754;
  stroke-dashoffset: 754;
  transition: stroke-dashoffset 0.1s linear;
  filter: drop-shadow(0 0 6px #22c55e);
}

.status {
  margin-top: 20px;
  opacity: 0.8;
}

canvas {
  display: none;
}
</style>
</head>

<body>

<h2>🔒 Face Unlock System</h2>

<div class="wrapper">
  <svg width="260" height="260">
    <circle class="bg" cx="130" cy="130" r="120"/>
    <circle class="progress" cx="130" cy="130" r="120"/>
  </svg>

  <div class="camera">
    <video id="video" autoplay playsinline></video>
  </div>
</div>

<div class="status" id="status">Mencari wajah...</div>

<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const statusText = document.getElementById("status");
const progressCircle = document.querySelector(".progress");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const radius = 120;
const circumference = 2 * Math.PI * radius;

progressCircle.style.strokeDasharray = circumference;
progressCircle.style.strokeDashoffset = circumference;

let progress = 0;
let faceDetected = false;
let holdTimer = null;

// 📸 kamera
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  });

  video.srcObject = stream;
}

// 🔍 simulasi deteksi wajah (nanti bisa diganti AI beneran)
function detectFakeFace() {
  // karena belum pakai AI, kita anggap wajah ada kalau video jalan
  return video.readyState === 4;
}

// 🔵 update ring
function setProgress(percent) {
  const offset = circumference - (percent / 100) * circumference;
  progressCircle.style.strokeDashoffset = offset;
}

// 🔥 loop scanning
function scanLoop() {
  faceDetected = detectFakeFace();

  if (faceDetected) {
    statusText.textContent = "Wajah terdeteksi...";

    progress += 2; // isi pelan

    if (progress >= 100) {
      progress = 100;
      setProgress(progress);

      captureFace();
      return;
    }

  } else {
    statusText.textContent = "Mencari wajah...";
    progress -= 3; // reset kalau hilang
    if (progress < 0) progress = 0;
  }

  setProgress(progress);
  requestAnimationFrame(scanLoop);
}

// 📸 capture setelah full
function captureFace() {
  statusText.textContent = "Mengambil gambar...";

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  setTimeout(() => {
    statusText.textContent = "✔ Face Verified";
  }, 1000);
}

// start
window.onload = async () => {
  await startCamera();
  scanLoop();
};
</script>

</body>
</html>
